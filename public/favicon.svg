<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Navy circle background -->
  <circle cx="32" cy="32" r="32" fill="#1a3a5c"/>

  <!-- Paw pad - main -->
  <ellipse cx="32" cy="38" rx="11" ry="9" fill="white"/>

  <!-- Paw toes -->
  <ellipse cx="20" cy="24" rx="5.5" ry="5.5" fill="white"/>
  <ellipse cx="32" cy="20" rx="5.5" ry="5.5" fill="white"/>
  <ellipse cx="44" cy="24" rx="5.5" ry="5.5" fill="white"/>

  <!-- Small airplane departing from paw - orange accent -->
  <g transform="translate(36, 10) rotate(25) scale(0.45)">
    <!-- Airplane body -->
    <ellipse cx="14" cy="16" rx="14" ry="4" fill="#c4622d"/>
    <!-- Nose -->
    <ellipse cx="30" cy="16" rx="5" ry="3.5" fill="#c4622d"/>
    <!-- Wings -->
    <polygon points="16,12 26,4 30,4 24,12" fill="#c4622d"/>
    <polygon points="16,20 26,28 30,28 24,20" fill="#c4622d"/>
    <!-- Tail -->
    <polygon points="0,12 6,4 10,4 8,12" fill="#c4622d"/>
    <polygon points="0,20 6,28 10,28 8,20" fill="#c4622d"/>
  </g>
</svg>
